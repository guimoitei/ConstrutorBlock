<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Block 3D Studio Pro</title>
    
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/@blockly/field-colour"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/TransformControls.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/objects/Sky.js"></script>
    
    <style>
        * { box-sizing: border-box; user-select: none; }
        body { margin: 0; display: flex; height: 100vh; background: #111; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Layout Principal */
        #editor-container { width: 55%; height: 100%; display: flex; flex-direction: column; border-right: 2px solid #333; }
        #visualizer { width: 45%; height: 100%; position: relative; background: #000; }
        
        /* Abas do Editor */
        #tab-bar { display: flex; background: #222; border-bottom: 2px solid #333; }
        .tab-btn { padding: 15px 25px; cursor: pointer; background: none; border: none; color: #888; font-weight: bold; text-transform: uppercase; border-bottom: 2px solid transparent; transition: 0.2s; }
        .tab-btn:hover { color: white; background: #2a2a2a; }
        .tab-btn.active { color: #00e676; border-bottom-color: #00e676; background: #2a2a2a; }
        .tab-content { flex: 1; display: none; position: relative; }
        .tab-content.active { display: block; }
        #blocklyDiv { width: 100%; height: 100%; }

        /* Estilo da Aba de Texturas */
        #texture-editor { padding: 20px; display: flex; flex-direction: column; gap: 15px; align-items: center; background: #1a1a1a; height: 100%; overflow-y: auto; }
        #paint-canvas { border: 4px solid #333; background: white; cursor: crosshair; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .toolbar { display: flex; gap: 10px; align-items: center; background: #222; padding: 10px; border-radius: 8px; width: 100%; justify-content: center;}
        .tool-btn { padding: 8px 15px; cursor: pointer; border-radius: 4px; border: 1px solid #444; background: #333; color: white; }
        .tool-btn:hover { background: #444; }
        #color-picker { width: 40px; height: 40px; border: none; cursor: pointer; background: none; }
        #brush-size { width: 100px; cursor: pointer; }
        #texture-list { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; width: 100%; justify-content: center;}
        .texture-thumb { width: 80px; height: 80px; border: 2px solid #444; border-radius: 4px; cursor: pointer; object-fit: cover; transition: 0.2s; }
        .texture-thumb:hover { border-color: #00e676; transform: scale(1.05); }

        /* UI do Palco (Visualizer) */
        #ui-layer { position: absolute; top: 15px; right: 15px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; align-items: flex-end; }
        .btn-group { display: flex; gap: 5px; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; text-transform: uppercase; box-shadow: 0 4px 10px rgba(0,0,0,0.5); transition: 0.2s; }
        button:active { transform: scale(0.95); }
        #runBtn { background: #00e676; color: #003311; font-size: 1.1em; }
        #runBtn:hover { background: #00ff88; }
        #clearBtn { background: #ff5252; color: white; }
        .gizmo-btn { background: #333; color: #aaa; border: 1px solid #444; padding: 8px 12px; font-size: 0.9em;}
        .gizmo-btn:hover { background: #444; color: white; }
        .gizmo-btn.active { background: #4C97FF; color: white; border-color: #4C97FF; }
        
        /* Instruções de Câmera */
        #camera-instructions { position: absolute; bottom: 15px; left: 15px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 4px; border: 1px solid #444; pointer-events: none; font-size: 0.85em; color: #aaa; display: none;}
        #camera-instructions b { color: white; }
        
        /* Blockly Fixes */
        .blocklyTreeLabel { font-size: 15px; padding: 3px; }
        .blocklyFlyoutBackground { fill: #222 !important; }
    </style>
</head>
<body>

    <div id="editor-container">
        <div id="tab-bar">
            <button class="tab-btn active" onclick="openTab('blocks')">🧩 Blocos de Código</button>
            <button class="tab-btn" onclick="openTab('textures')">🎨 Minhas Texturas</button>
        </div>

        <div id="blocks-content" class="tab-content active">
            <div id="blocklyDiv"></div>
        </div>

        <div id="textures-content" class="tab-content">
            <div id="texture-editor">
                <canvas id="paint-canvas" width="256" height="256"></canvas>
                
                <div class="toolbar">
                    <input type="color" id="color-picker" value="#ff0000">
                    <input type="range" id="brush-size" min="1" max="20" value="5">
                    <button class="tool-btn" onclick="clearCanvas()">🗑️ Limpar</button>
                    <button class="tool-btn" style="background:#4C97FF" onclick="savePaintTexture()">✅ Usar Desenho</button>
                </div>
                
                <div class="toolbar" style="background:#2a2a2a">
                    <label for="upload-image" class="tool-btn" style="background:#9966FF; cursor:pointer;">📤 Upload Imagem</label>
                    <input type="file" id="upload-image" accept="image/*" style="display:none" onchange="handleImageUpload(this)">
                    <span style="font-size:0.8em; color:#888;">(PNG/JPG max 1MB)</span>
                </div>

                <div id="texture-list">
                    </div>
            </div>
        </div>
    </div>
    
    <div id="visualizer">
        <div id="ui-layer">
            <div class="btn-group">
                <button id="clearBtn" onclick="clearScene()">Limpar Mundo</button>
                <button id="runBtn" onclick="runCode()">▶ Rodar Código</button>
            </div>
            <div class="btn-group" style="margin-top:10px;">
                <button id="gizmo-translate" class="gizmo-btn active" onclick="setGizmoMode('translate')">✋ Mover (T)</button>
                <button id="gizmo-rotate" class="gizmo-btn" onclick="setGizmoMode('rotate')">🔄 Girar (R)</button>
                <button id="gizmo-scale" class="gizmo-btn" onclick="setGizmoMode('scale')">📐 Escalar (S)</button>
            </div>
        </div>

        <div id="camera-instructions">
            🎮 Modo Viagem: Use <b>W,A,S,D</b> para andar, <b>Mouse</b> para olhar. <br>
            Clique no palco para entrar. Pressione <b>ESC</b> para sair.
        </div>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="Eventos" colour="#FFD500">
            <block type="event_when_run"></block>
        </category>
        <category name="Formas" colour="#9966FF flyout">
            <block type="create_cube"></block>
            <block type="create_sphere"></block>
        </category>
        <category name="Cores" colour="#9966FF">
            <block type="set_color"></block>
        </category>
        <category name="Texturas" colour="#9966FF" id="cat_textures">
            <block type="set_texture_default"></block>
            </category>
        <category name="Movimento" colour="#4C97FF">
            <block type="move_xyz">
                <value name="X"><shadow type="math_number"><field name="NUM">0</field></shadow></value>
                <value name="Y"><shadow type="math_number"><field name="NUM">1</field></shadow></value>
                <value name="Z"><shadow type="math_number"><field name="NUM">0</field></shadow></value>
            </block>
        </category>
        <sep></sep>
        <category name="Controle" colour="#FFAB19">
            <block type="controls_repeat_ext">
                <value name="TIMES"><shadow type="math_number"><field name="NUM">5</field></shadow></value>
            </block>
        </category>
        <category name="Matemática" colour="#5962C0">
            <block type="math_number"></block>
            <block type="math_arithmetic"></block>
            <block type="math_random_int">
                <value name="FROM"><shadow type="math_number"><field name="NUM">-10</field></shadow></value>
                <value name="TO"><shadow type="math_number"><field name="NUM">10</field></shadow></value>
            </block>
        </category>
        <category name="Variáveis" colour="#FF8C1A" custom="VARIABLE"></category>
    </xml>

    <script>
        // ==========================================================
        // SISTEMA DE ABAS E UI
        // ==========================================================
        function openTab(tabName) {
            // Esconder todos os conteúdos
            const contents = document.getElementsByClassName('tab-content');
            for (let i = 0; i < contents.length; i++) contents[i].classList.remove('active');
            
            // Remover classe active dos botões
            const buttons = document.getElementsByClassName('tab-btn');
            for (let i = 0; i < buttons.length; i++) buttons[i].classList.remove('active');
            
            // Mostrar aba atual
            document.getElementById(tabName + '-content').classList.add('active');
            event.currentTarget.classList.add('active');

            // Fix bug Blockly resize
            if(tabName === 'blocks' && workspace) {
                Blockly.svgResize(workspace);
            }
        }

        // ==========================================================
        // ENGINE 3D - THREE.JS COM CÉU E GRAMA
        // ==========================================================
        const visualizerDiv = document.getElementById('visualizer');
        const scene = new THREE.Scene();
        
        // Câmera Perspectiva
        const camera = new THREE.PerspectiveCamera(75, (window.innerWidth * 0.45) / window.innerHeight, 0.1, 2000);
        camera.position.set(0, 5, 15);
        camera.lookAt(0, 2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth * 0.45, window.innerHeight);
        renderer.shadowMap.enabled = true; // Habilitar sombras para realismo
        visualizerDiv.appendChild(renderer.domElement);

        // --- ADICIONANDO CÉU REALISTA (THREE.Sky) ---
        const sky = new THREE.Sky();
        sky.scale.setScalar(450000);
        scene.add(sky);

        const sunParams = { elevation: 2, azimuth: 180 };
        const sun = new THREE.Vector3();
        
        function updateSun() {
            const phi = THREE.MathUtils.degToRad(90 - sunParams.elevation);
            const theta = THREE.MathUtils.degToRad(sunParams.azimuth);
            sun.setFromSphericalCoords(1, phi, theta);
            sky.material.uniforms['sunPosition'].value.copy(sun);
        }
        updateSun();

        // --- ADICIONANDO CHÃO COM TEXTURA DE GRAMA ---
        // Criar textura de grama proceduralmente (para não carregar arquivo externo)
        const canvasGrama = document.createElement('canvas');
        canvasGrama.width = 64; canvasGrama.height = 64;
        const ctxG = canvasGrama.getContext('2d');
        ctxG.fillStyle = '#3a7d44'; ctxG.fillRect(0,0,64,64);
        for(let i=0; i<1000; i++){
            ctxG.fillStyle = 'rgba(20,60,20,'+Math.random()+')';
            ctxG.fillRect(Math.random()*64, Math.random()*64, 2, 2);
        }
        const grassTexture = new THREE.CanvasTexture(canvasGrama);
        grassTexture.wrapS = THREE.RepeatWrapping;
        grassTexture.wrapT = THREE.RepeatWrapping;
        grassTexture.repeat.set(100, 100); // Repetir textura para parecer chão infinito

        const groundGeo = new THREE.PlaneGeometry(1000, 1000);
        const groundMat = new THREE.MeshStandardMaterial({ map: grassTexture, side: THREE.DoubleSide });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.01; // Ligeiramente abaixo do zero para evitar bugs visuais
        ground.receiveShadow = true;
        scene.add(ground);

        // Iluminação
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(sun.x * 100, sun.y * 100, sun.z * 100);
        dirLight.castShadow = true;
        // Ajustar área de sombra para performance (4GB RAM)
        dirLight.shadow.camera.left = -50; dirLight.shadow.camera.right = 50;
        dirLight.shadow.camera.top = 50; dirLight.shadow.camera.bottom = -50;
        scene.add(dirLight);

        let objects = [];
        let lastObj = null;

        // ==========================================================
        // CONTROLES DE CÂMERA E GIZMOS (NOVO)
        // ==========================================================
        
        // 1. Câmera Fly (PointerLockControls)
        const flyControls = new THREE.PointerLockControls(camera, renderer.domElement);
        visualizerDiv.addEventListener('click', () => {
            if(!transformControls.dragging) flyControls.lock();
        });

        // Mostrar/Esconder instruções
        const cameraInstr = document.getElementById('camera-instructions');
        flyControls.addEventListener('lock', () => { cameraInstr.style.display = 'block'; transformControls.detach(); });
        flyControls.addEventListener('unlock', () => cameraInstr.style.display = 'none');

        // Movimentação W,A,S,D
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        const clockFly = new THREE.Clock();

        document.addEventListener('keydown', (e) => {
            if(!flyControls.isLocked) return;
            switch(e.code){
                case 'KeyW': moveForward = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyD': moveRight = true; break;
            }
        });
        document.addEventListener('keyup', (e) => {
            switch(e.code){
                case 'KeyW': moveForward = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyD': moveRight = false; break;
                case 'KeyT': setGizmoMode('translate'); break; // Atalhos Gizmo
                case 'KeyR': setGizmoMode('rotate'); break;
                case 'KeyS': setGizmoMode('scale'); break;
            }
        });

        // 2. Gizmos de Transformação (TransformControls)
        const transformControls = new THREE.TransformControls(camera, renderer.domElement);
        scene.add(transformControls);

        // Bugfix: Impedir câmera fly de rodar quando arrasta gizmo
        transformControls.addEventListener('dragging-changed', (e) => {
            // Temporariamente desativar cliques no visualizer para não entrar em lock
            if(e.value) visualizerDiv.style.pointerEvents = 'none';
            else visualizerDiv.style.pointerEvents = 'auto';
        });

        // Selecionar objeto ao clicar
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        renderer.domElement.addEventListener('mousedown', (e) => {
            if(flyControls.isLocked) return;
            e.preventDefault();

            // Calcular posição do mouse relativa ao div do visualizer
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ( (e.clientX - rect.left) / rect.width ) * 2 - 1;
            mouse.y = - ( (e.clientY - rect.top) / rect.height ) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            // Interceptar apenas objetos criados pela criança, ignorando chão e gizmo
            const intersects = raycaster.intersectObjects(objects);

            if (intersects.length > 0) {
                const object = intersects[0].object;
                if (object !== lastObj) {
                    lastObj = object;
                    transformControls.attach(object);
                }
            } else {
                // Se clicar no vazio, desseleciona (exceto se estiver clicando no próprio gizmo)
                if(!transformControls.dragging) {
                   // transformControls.detach();
                   // lastObj = null; // Manter lastObj para blocos de cor/textura funcionarem
                }
            }
        });

        // Mudar modo do Gizmo
        function setGizmoMode(mode) {
            transformControls.setMode(mode);
            // Atualizar UI
            document.querySelectorAll('.gizmo-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('gizmo-'+mode).classList.add('active');
        }

        // Loop de Animação Principal
        function animate() {
            requestAnimationFrame(animate);

            // Animação Câmera Fly
            if (flyControls.isLocked) {
                const delta = clockFly.getDelta();
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();
                const speed = 200.0;
                if (moveForward || moveBackward) velocity.z -= direction.z * speed * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * speed * delta;
                flyControls.moveRight(-velocity.x * delta);
                flyControls.moveForward(-velocity.z * delta);
            }

            renderer.render(scene, camera);
        }
        animate();

        // ==========================================================
        // SISTEMA DE TEXTURAS CUSTOMIZADAS (NOVO)
        // ==========================================================
        const paintCanvas = document.getElementById('paint-canvas');
        const pCtx = paintCanvas.getContext('2d');
        const colorPicker = document.getElementById('color-picker');
        const brushSizeSlider = document.getElementById('brush-size');
        const textureListDiv = document.getElementById('texture-list');
        let isPainting = false;
        
        // Setup Canvas Branco
        clearCanvas();

        // Lógica de Desenho
        paintCanvas.addEventListener('mousedown', (e) => { isPainting = true; paint(e); });
        window.addEventListener('mouseup', () => isPainting = false);
        paintCanvas.addEventListener('mousemove', paint);

        function paint(e) {
            if(!isPainting) return;
            const rect = paintCanvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            pCtx.fillStyle = colorPicker.value;
            pCtx.beginPath();
            pCtx.arc(x, y, brushSizeSlider.value, 0, Math.PI * 2);
            pCtx.fill();
        }

        function clearCanvas() {
            pCtx.fillStyle = 'white';
            pCtx.fillRect(0, 0, paintCanvas.width, paintCanvas.height);
        }

        // Dicionário de texturas salvas (IDs e THREE.Texture)
        const savedTextures = {};
        let textureCount = 0;

        // Salvar Desenho como Textura
        function savePaintTexture() {
            const dataUrl = paintCanvas.toDataURL();
            createTextureFromData(dataUrl, 'Desenho');
        }

        // Lidar com Upload de Imagem
        function handleImageUpload(input) {
            if (input.files && input.files[0]) {
                if(input.files[0].size > 1024 * 1024) { alert("Imagem muito pesada! Max 1MB."); return; }
                const reader = new FileReader();
                reader.onload = function(e) {
                    createTextureFromData(e.target.result, 'Upload');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Criar Textura, adicionar na UI e gerar Bloco Blockly
        function createTextureFromData(dataUrl, sourcePrefix) {
            const textureId = 'custom_tex_' + textureCount;
            const blockType = 'set_texture_' + textureId;
            const displayName = sourcePrefix + ' ' + (textureCount + 1);

            // 1. Criar Three.js Texture
            const img = new Image();
            img.onload = function() {
                const tex = new THREE.Texture(img);
                tex.needsUpdate = true;
                savedTextures[textureId] = tex;
            };
            img.src = dataUrl;

            // 2. Adicionar Miniatura na UI (para feedback)
            const thumb = new Image();
            thumb.src = dataUrl;
            thumb.className = 'texture-thumb';
            thumb.title = displayName;
            thumb.onclick = () => { if(lastObj) applyTextureToObj(texId); }; // Atalho: clica na thumb aplica no obj selecionado
            const texId = textureId; // Closure fix
            textureListDiv.appendChild(thumb);

            // 3. Gerar Novo Bloco Blockly dinamicamente
            Blockly.defineBlocksWithJsonArray([{
                "type": blockType,
                "message0": "🎨 Usar Textura: " + displayName,
                "previousStatement": null,
                "nextStatement": null,
                "colour": 290
            }]);

            // 4. Registrar Gerador de Código
            javascriptGenerator.forBlock[blockType] = function(block) {
                return `window.colorObj("#ffffff"); window.applyTextureToObj("${blockId}");\n`;
            };
            const blockId = textureId; // Closure fix

            // 5. Atualizar Toolbox do Blockly
            updateToolbox(blockType);

            textureCount++;
            alert(displayName + " salva! Vá na aba Blocos > Categoria Texturas.");
        }

        // Adicionar novo bloco na Toolbox sem bugar o workspace
        function updateToolbox(newBlockType) {
            const toolboxXml = document.getElementById('toolbox');
            const categoryTextures = toolboxXml.querySelector('#cat_textures');
            
            const newBlockXml = document.createElement('block');
            newBlockXml.setAttribute('type', newBlockType);
            categoryTextures.appendChild(newBlockXml);

            workspace.updateToolbox(toolboxXml);
        }

        // ==========================================================
        // BLOCKLY - CONFIGURAÇÃO BÁSICA E BLOCOS (ATUALIZADO)
        // ==========================================================
        
        // Bloco Default (Grama)
        Blockly.defineBlocksWithJsonArray([{
            "type": "set_texture_default",
            "message0": "🌿 Usar Textura: Grama",
            "previousStatement": null,
            "nextStatement": null,
            "colour": 290
        }]);

        // Definição dos blocos customizados (mantidos do anterior)
        Blockly.defineBlocksWithJsonArray([
            { "type": "event_when_run", "message0": "🏁 Ao clicar em Rodar", "nextStatement": null, "colour": 60 },
            { "type": "create_cube", "message0": "📦 Criar Cubo", "previousStatement": null, "nextStatement": null, "colour": 160 },
            { "type": "create_sphere", "message0": "🔮 Criar Esfera", "previousStatement": null, "nextStatement": null, "colour": 160 },
            { "type": "set_color", "message0": "Pintar de %1", "args0": [{ "type": "field_colour", "name": "COL", "colour": "#ff0000" }], "previousStatement": null, "nextStatement": null, "colour": 160 },
            { "type": "move_xyz", "message0": "Mover X: %1 Y: %2 Z: %3", "args0": [
                { "type": "input_value", "name": "X", "check": "Number" },
                { "type": "input_value", "name": "Y", "check": "Number" },
                { "type": "input_value", "name": "Z", "check": "Number" }
            ], "previousStatement": null, "nextStatement": null, "colour": 210 },
            { "type": "rotate_obj", "message0": "Girar %1 em %2 graus", "args0": [
                { "type": "field_dropdown", "name": "AXIS", "options": [["X", "x"], ["Y", "y"], ["Z", "z"]] },
                { "type": "input_value", "name": "DEG", "check": "Number" }
            ], "previousStatement": null, "nextStatement": null, "colour": 210 },
            { "type": "set_dim", "message0": "Mudar %1 para %2", "args0": [
                { "type": "field_dropdown", "name": "DIM", "options": [["Largura", "x"], ["Altura", "y"], ["Profundidade", "z"]] },
                { "type": "input_value", "name": "VAL", "check": "Number" }
            ], "previousStatement": null, "nextStatement": null, "colour": 120 }
        ]);

        // Geradores de Código
        const javascriptGenerator = Blockly.JavaScript;
        javascriptGenerator.forBlock['event_when_run'] = function() { return ''; };
        javascriptGenerator.forBlock['create_cube'] = function() { return 'window.addObj("cube");\n'; };
        javascriptGenerator.forBlock['create_sphere'] = function() { return 'window.addObj("sphere");\n'; };
        
        // Ao definir textura nativa (Grama)
        javascriptGenerator.forBlock['set_texture_default'] = function() {
            // Resetar cor para branco para a textura aparecer corretamente
            return 'window.colorObj("#ffffff"); window.applyTextureToObj("default_grass");\n'; 
        };

        javascriptGenerator.forBlock['set_color'] = function(block) {
            // Remover textura ao pintar de cor sólida (opcional, depende do estilo)
            return `window.applyTextureToObj(null); window.colorObj("${block.getFieldValue('COL')}");\n`;
        };
        
        javascriptGenerator.forBlock['move_xyz'] = function(block) {
            const x = javascriptGenerator.valueToCode(block, 'X', javascriptGenerator.ORDER_ATOMIC) || 0;
            const y = javascriptGenerator.valueToCode(block, 'Y', javascriptGenerator.ORDER_ATOMIC) || 0;
            const z = javascriptGenerator.valueToCode(block, 'Z', javascriptGenerator.ORDER_ATOMIC) || 0;
            return `window.moveObj(${x}, ${y}, ${z});\n`;
        };

        // ==========================================================
        // FUNÇÕES GLOBAIS DE EXECUÇÃO DO MUNDO (ATUALIZADO)
        // ==========================================================
        window.addObj = function(type) {
            const geo = type === "cube" ? new THREE.BoxGeometry(2, 2, 2) : new THREE.SphereGeometry(1.2, 32, 32);
            // MeshStandardMaterial é necessário para sombras e texturas reais
            const mat = new THREE.MeshStandardMaterial({ color: 0x4C97FF, roughness: 0.7, metalness: 0.2 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.y = (type === "cube") ? 1 : 1.2; // Nascer em cima da grama
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            objects.push(mesh);
            lastObj = mesh;
            // Auto-selecionar no gizmo
            transformControls.attach(mesh);
        };

        window.moveObj = function(x, y, z) { if(lastObj) lastObj.position.set(x, y, z); };
        window.colorObj = function(hex) { if(lastObj) lastObj.material.color.set(hex); };

        // Aplicar Textura Customizada ou Nativa
        window.applyTextureToObj = function(textureId) {
            if(!lastObj) return;
            
            if(textureId === null) {
                lastObj.material.map = null;
            } else if(textureId === "default_grass") {
                // Grama tem propriedades de repetição diferentes das texturas de desenho
                const texGrass = grassTexture.clone();
                texGrass.repeat.set(1,1); // No objeto não repete
                texGrass.needsUpdate = true;
                lastObj.material.map = texGrass;
            } else if(savedTextures[textureId]) {
                lastObj.material.map = savedTextures[textureId];
            }
            lastObj.material.needsUpdate = true;
        };

        function clearScene() {
            transformControls.detach();
            objects.forEach(obj => {
                obj.geometry.dispose();
                if(obj.material.map) obj.material.map.dispose();
                obj.material.dispose();
                scene.remove(obj);
            });
            objects = [];
            lastObj = null;
        }

        // ==========================================================
        // INICIALIZAÇÃO FINAL
        // ==========================================================
        const workspace = Blockly.inject('blocklyDiv', {
            toolbox: document.getElementById('toolbox'),
            trashcan: true,
            move: { scrollbars: true, drag: true, wheel: true },
            zoom: { controls: true, wheel: true, startScale: 0.9 }
        });

        // Bugfix inicialização toolbox
        setTimeout(() => { Blockly.svgResize(workspace); }, 500);

        function runCode() {
            // Não limpamos a cena automaticamente para permitir edição com Gizmo + Código misturados
            // Se a criança quiser limpar, ela usa o botão "Limpar Mundo"
            const code = javascriptGenerator.workspaceToCode(workspace);
            try {
                const func = new Function(code);
                func();
            } catch (e) { alert("Erro: " + e.message); }
        }

        // Responsividade
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            renderer.setSize(w * 0.45, h);
            camera.aspect = (w * 0.45) / h;
            camera.updateProjectionMatrix();
            Blockly.svgResize(workspace);
        });
    </script>
</body>
</html>
