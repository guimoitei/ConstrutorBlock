<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Block Studio Pro - Engine & Modeler</title>
    
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/@blockly/field-colour"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/TransformControls.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { margin: 0; display: flex; height: 100vh; background: #111; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Painel Esquerdo com Abas */
        #left-panel { width: 40%; height: 100%; display: flex; flex-direction: column; border-right: 2px solid #333; }
        #visualizer { width: 60%; height: 100%; position: relative; background: #000; }
        
        #tabs { display: flex; background: #222; border-bottom: 2px solid #444; }
        .tab-btn { padding: 12px; cursor: pointer; background: none; border: none; color: #777; font-weight: bold; flex: 1; }
        .tab-btn.active { color: #00e676; border-bottom: 2px solid #00e676; background: #2a2a2a; }
        
        .content-area { flex: 1; display: none; overflow-y: auto; }
        .content-area.active { display: flex; flex-direction: column; }

        /* Outliner (Lista de Objetos) */
        #outliner { padding: 10px; background: #1a1a1a; }
        .outliner-item { padding: 8px; margin-bottom: 5px; background: #333; border-radius: 4px; cursor: pointer; display: flex; justify-content: space-between; }
        .outliner-item:hover { background: #444; }
        .outliner-item.selected { border: 1px solid #00e676; background: #224422; }

        /* UI do Palco */
        #ui-layer { position: absolute; top: 15px; right: 15px; z-index: 100; display: flex; flex-direction: column; gap: 8px; }
        .gizmo-tools { display: flex; gap: 5px; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 5px; }
        button { padding: 10px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-green { background: #00e676; color: black; }
        .tool-btn { background: #444; color: white; font-size: 12px; }
        .tool-btn.active { background: #00e676; color: black; }

        /* Modelador 3D */
        #modeler-area { padding: 20px; text-align: center; }
        #modeler-canvas { border: 2px solid #444; background: #222; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="left-panel">
        <div id="tabs">
            <button class="tab-btn active" onclick="switchTab('editor')">PROJETO</button>
            <button class="tab-btn" onclick="switchTab('objects')">HIERARQUIA</button>
            <button class="tab-btn" onclick="switchTab('modeler')">MODELADOR</button>
            <button class="tab-btn" onclick="switchTab('community')">COMUNIDADE</button>
        </div>

        <div id="tab-editor" class="content-area active">
            <div id="blocklyDiv" style="height: 100%;"></div>
        </div>

        <div id="tab-objects" class="content-area">
            <div id="outliner">
                <h3>Objetos na Cena</h3>
                <div id="obj-list">Nenhum objeto criado.</div>
            </div>
        </div>

        <div id="tab-modeler" class="content-area">
            <div id="modeler-area">
                <h3>Criar Novo Objeto</h3>
                <p style="font-size: 12px; color: #888;">Em breve: Esculpir em 3D. Por enquanto, configure as dimensões base:</p>
                <label>Cor do Modelo:</label><br>
                <input type="color" id="model-color" value="#00ff88"><br><br>
                <button class="btn-green" onclick="spawnCustomModel()">CRIAR E ADICIONAR AO MUNDO</button>
            </div>
        </div>

        <div id="tab-community" class="content-area">
            <div id="game-list" style="padding: 15px;">Carregando...</div>
        </div>
    </div>

    <div id="visualizer">
        <div id="ui-layer">
            <div class="gizmo-tools">
                <button class="tool-btn active" id="btn-move" onclick="setGizmoMode('translate')">MOVER</button>
                <button class="tool-btn" id="btn-rotate" onclick="setGizmoMode('rotate')">GIRAR</button>
                <button class="tool-btn" id="btn-scale" onclick="setGizmoMode('scale')">ESCALAR</button>
            </div>
            <button class="btn-green" onclick="runCode()">▶ JOGAR</button>
            <button style="background:#4C97FF; color:white" onclick="publishGame()">🌐 PUBLICAR</button>
            <button style="background:#ff4444; color:white" onclick="resetWorld()">🗑️ LIMPAR</button>
        </div>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="Eventos" colour="#FFD500"><block type="event_when_run"></block></category>
        <category name="Formas" colour="#9966FF">
            <block type="create_cube"></block>
            <block type="create_sphere"></block>
        </category>
        <category name="Gameplay" colour="#00e676">
            <block type="spawn_enemy"></block>
            <block type="spawn_checkpoint"></block>
        </category>
        <category name="Transformar" colour="#4C97FF">
            <block type="move_xyz">
                <value name="X"><shadow type="math_number"><field name="NUM">0</field></shadow></value>
                <value name="Y"><shadow type="math_number"><field name="NUM">0.5</field></shadow></value>
                <value name="Z"><shadow type="math_number"><field name="NUM">0</field></shadow></value>
            </block>
        </category>
    </xml>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyAqw3mMEc8ZiG9ZKC8R3O5bJ8VQ4d9vwaM",
            authDomain: "gamefriends-fc791.firebaseapp.com",
            databaseURL: "https://gamefriends-fc791-default-rtdb.firebaseio.com",
            projectId: "gamefriends-fc791",
            storageBucket: "gamefriends-fc791.firebasestorage.app",
            messagingSenderId: "329648550875",
            appId: "1:329648550875:web:6112d5521f117378f52dfe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- THREE.JS ENGINE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);
        const camera = new THREE.PerspectiveCamera(75, (window.innerWidth*0.6)/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth*0.6, window.innerHeight);
        document.getElementById('visualizer').appendChild(renderer.domElement);

        scene.add(new THREE.GridHelper(50, 50, 0x444444, 0x333333));
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        
        const orbit = new THREE.OrbitControls(camera, renderer.domElement);
        camera.position.set(10, 10, 10);

        // --- GIZMO SYSTEM ---
        const gizmo = new THREE.TransformControls(camera, renderer.domElement);
        gizmo.addEventListener('dragging-changed', (event) => { orbit.enabled = !event.value; });
        scene.add(gizmo);

        let objects = [], selectedObj = null;

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        function setGizmoMode(mode) {
            gizmo.setMode(mode);
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + mode).classList.add('active');
        }

        // --- HIERARQUIA (OUTLINER) ---
        function updateOutliner() {
            const list = document.getElementById('obj-list');
            list.innerHTML = '';
            objects.forEach((obj, index) => {
                const item = document.createElement('div');
                item.className = 'outliner-item' + (selectedObj === obj ? ' selected' : '');
                item.innerHTML = `<span>${obj.userData.name}</span><small>${obj.type}</small>`;
                item.onclick = () => selectObject(obj);
                list.appendChild(item);
            });
        }

        function selectObject(obj) {
            selectedObj = obj;
            gizmo.attach(obj);
            updateOutliner();
        }

        // --- ENGINE ACTIONS ---
        window.addObj = function(type, col, name = "Objeto") {
            let geo = type === "cube" ? new THREE.BoxGeometry(1, 1, 1) : new THREE.SphereGeometry(0.7);
            let mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({color: col}));
            mesh.position.y = 0.5;
            mesh.userData.name = name + " " + (objects.length + 1);
            scene.add(mesh);
            objects.push(mesh);
            selectObject(mesh);
            return mesh;
        };

        function resetWorld() {
            gizmo.detach();
            objects.forEach(o => scene.remove(o));
            objects = [];
            updateOutliner();
        }

        // --- MODELADOR ---
        function spawnCustomModel() {
            const color = document.getElementById('model-color').value;
            window.addObj("cube", color, "Meu Modelo");
            switchTab('objects');
        }

        // --- BLOCKLY ---
        Blockly.defineBlocksWithJsonArray([
            { "type": "event_when_run", "message0": "🏁 Ao Iniciar Jogo", "nextStatement": null, "colour": 60 },
            { "type": "create_cube", "message0": "📦 Criar Cubo", "previousStatement": null, "nextStatement": null, "colour": 260 },
            { "type": "create_sphere", "message0": "🔮 Criar Esfera", "previousStatement": null, "nextStatement": null, "colour": 260 },
            { "type": "spawn_enemy", "message0": "💀 Criar Inimigo", "previousStatement": null, "nextStatement": null, "colour": 0 },
            { "type": "spawn_checkpoint", "message0": "🚩 Criar Checkpoint", "previousStatement": null, "nextStatement": null, "colour": 120 },
            { "type": "move_xyz", "message0": "Mover X:%1 Y:%2 Z:%3", "args0": [
                {"type":"input_value","name":"X"},{"type":"input_value","name":"Y"},{"type":"input_value","name":"Z"}
            ], "previousStatement": null, "nextStatement": null, "colour": 210 }
        ]);

        const generator = Blockly.JavaScript;
        generator.forBlock['event_when_run'] = () => '';
        generator.forBlock['create_cube'] = () => 'window.addObj("cube", 0x4C97FF);\n';
        generator.forBlock['create_sphere'] = () => 'window.addObj("sphere", 0x4C97FF);\n';
        generator.forBlock['spawn_enemy'] = () => 'window.addObj("cube", 0xff0000, "Inimigo");\n';
        generator.forBlock['spawn_checkpoint'] = () => 'window.addObj("cube", 0xffff00, "Checkpoint");\n';
        generator.forBlock['move_xyz'] = (b) => {
            const x = generator.valueToCode(b, 'X', generator.ORDER_ATOMIC) || 0;
            const y = generator.valueToCode(b, 'Y', generator.ORDER_ATOMIC) || 0;
            const z = generator.valueToCode(b, 'Z', generator.ORDER_ATOMIC) || 0;
            return `if(selectedObj) selectedObj.position.set(${x},${y},${z});\n`;
        };

        const workspace = Blockly.inject('blocklyDiv', { toolbox: document.getElementById('toolbox') });

        function switchTab(t) {
            document.querySelectorAll('.content-area').forEach(a => a.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + t).classList.add('active');
            event.currentTarget.classList.add('active');
            if(t === 'editor') Blockly.svgResize(workspace);
        }

        // --- COMUNIDADE (SIMPLIFICADA) ---
        function loadCommunity() {
            db.ref('games').limitToLast(10).on('value', snap => {
                const list = document.getElementById('game-list');
                list.innerHTML = '';
                snap.forEach(c => {
                    const g = c.val();
                    list.innerHTML += `<div style="background:#333;margin-bottom:5px;padding:8px;border-radius:4px;">${g.name} <button class="btn-green" style="padding:4px" onclick="alert('Carregando...')">JOGAR</button></div>`;
                });
            });
        }
        loadCommunity();
    </script>
</body>
</html>
