<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Block Revolution - Community & Gameplay</title>
    
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { margin: 0; display: flex; height: 100vh; background: #111; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        
        /* Layout */
        #left-panel { width: 50%; height: 100%; display: flex; flex-direction: column; border-right: 2px solid #333; }
        #visualizer { width: 50%; height: 100%; position: relative; background: #000; }
        
        /* Abas */
        #tabs { display: flex; background: #222; border-bottom: 2px solid #444; }
        .tab-btn { padding: 15px 20px; cursor: pointer; background: none; border: none; color: #777; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .tab-btn.active { color: #00e676; border-bottom: 2px solid #00e676; background: #2a2a2a; }
        
        #blocklyDiv { flex: 1; width: 100%; }
        #community-div { display: none; padding: 20px; overflow-y: auto; flex: 1; background: #1a1a1a; }
        
        .game-item { background: #222; padding: 15px; border-radius: 8px; margin-bottom: 12px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .game-item:hover { border-color: #00e676; }
        
        /* Botões Flutuantes */
        #ui-layer { position: absolute; top: 20px; right: 20px; z-index: 100; display: flex; flex-direction: column; gap: 10px; }
        button { padding: 12px 20px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .run-btn { background: #00e676; color: #003311; font-size: 16px; }
        .pub-btn { background: #4C97FF; color: white; }
        button:hover { transform: scale(1.05); opacity: 0.9; }

        #instr { position: absolute; bottom: 15px; left: 15px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; font-size: 13px; color: #00e676; border: 1px solid #00e676; }
    </style>
</head>
<body>

    <div id="left-panel">
        <div id="tabs">
            <button id="btn-editor" class="tab-btn active" onclick="switchTab('editor')">Projeto</button>
            <button id="btn-community" class="tab-btn" onclick="switchTab('community')">Comunidade</button>
        </div>

        <div id="blocklyDiv"></div>

        <div id="community-div">
            <h2 style="color: #00e676;">🌍 Jogos da Comunidade</h2>
            <div id="game-list">Buscando mundos...</div>
        </div>
    </div>

    <div id="visualizer">
        <div id="ui-layer">
            <button class="run-btn" onclick="runCode()">▶ JOGAR / TESTAR</button>
            <button class="pub-btn" onclick="publishGame()">🌐 PUBLICAR JOGO</button>
            <button style="background: #555; color: white;" onclick="resetEditor()">🔄 MODO EDITOR</button>
        </div>
        <div id="instr"><b>Editor:</b> Mouse para girar. <br><b>Play:</b> WASD para mover o personagem.</div>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="Lógica Inicial" colour="#FFD500">
            <block type="event_when_run"></block>
        </category>
        <category name="Construção" colour="#9966FF">
            <block type="create_cube"></block>
            <block type="create_sphere"></block>
            <block type="set_color"></block>
        </category>
        <category name="Mundo & Itens" colour="#00e676">
            <block type="spawn_enemy"></block>
            <block type="spawn_checkpoint"></block>
            <block type="spawn_victory"></block>
        </category>
        <category name="Mochila" colour="#FF6680">
            <block type="give_weapon"></block>
        </category>
        <category name="Posição" colour="#4C97FF">
            <block type="move_xyz">
                <value name="X"><shadow type="math_number"><field name="NUM">0</field></shadow></value>
                <value name="Y"><shadow type="math_number"><field name="NUM">0.5</field></shadow></value>
                <value name="Z"><shadow type="math_number"><field name="NUM">0</field></shadow></value>
            </block>
        </category>
        <sep></sep>
        <category name="Controle" colour="#FFAB19">
            <block type="controls_repeat_ext"></block>
        </category>
        <category name="Variáveis" colour="#FF8C1A" custom="VARIABLE"></category>
    </xml>

    <script>
        // --- 1. FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "AIzaSyAqw3mMEc8ZiG9ZKC8R3O5bJ8VQ4d9vwaM",
            authDomain: "gamefriends-fc791.firebaseapp.com",
            databaseURL: "https://gamefriends-fc791-default-rtdb.firebaseio.com",
            projectId: "gamefriends-fc791",
            storageBucket: "gamefriends-fc791.firebasestorage.app",
            messagingSenderId: "329648550875",
            appId: "1:329648550875:web:6112d5521f117378f52dfe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- 2. THREE.JS ENGINE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Céu
        
        const camera = new THREE.PerspectiveCamera(75, (window.innerWidth*0.5)/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth*0.5, window.innerHeight);
        document.getElementById('visualizer').appendChild(renderer.domElement);

        // Chão e Luz
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({color: 0x333333}));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        // Controles de Editor
        const orbit = new THREE.OrbitControls(camera, renderer.domElement);
        camera.position.set(10, 10, 10);

        let objects = [];
        let player = null;
        let isPlaying = false;
        const keys = {};

        // Controles de Teclado
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function animate() {
            requestAnimationFrame(animate);
            
            if (isPlaying && player) {
                // Movimento do Personagem
                const speed = 0.15;
                if(keys['w']) player.position.z -= speed;
                if(keys['s']) player.position.z += speed;
                if(keys['a']) player.position.x -= speed;
                if(keys['d']) player.position.x += speed;

                // Câmera segue o personagem
                camera.position.set(player.position.x, player.position.y + 6, player.position.z + 10);
                camera.lookAt(player.position);
            } else {
                orbit.update();
            }
            renderer.render(scene, camera);
        }
        animate();

        // --- 3. BLOCOS BLOCKLY ---
        Blockly.defineBlocksWithJsonArray([
            { "type": "event_when_run", "message0": "🏁 Ao Iniciar Jogo", "nextStatement": null, "colour": 60 },
            { "type": "create_cube", "message0": "📦 Criar Cubo", "previousStatement": null, "nextStatement": null, "colour": 260 },
            { "type": "create_sphere", "message0": "🔮 Criar Esfera", "previousStatement": null, "nextStatement": null, "colour": 260 },
            { "type": "spawn_enemy", "message0": "💀 Adicionar Inimigo", "previousStatement": null, "nextStatement": null, "colour": 0 },
            { "type": "spawn_checkpoint", "message0": "🚩 Adicionar Checkpoint", "previousStatement": null, "nextStatement": null, "colour": 120 },
            { "type": "spawn_victory", "message0": "🏆 Objeto de Vitória", "previousStatement": null, "nextStatement": null, "colour": 45 },
            { "type": "give_weapon", "message0": "🔫 Equipar Arma", "previousStatement": null, "nextStatement": null, "colour": 330 },
            { "type": "set_color", "message0": "Cor %1", "args0": [{"type": "field_colour", "name": "COL", "colour": "#ff0000"}], "previousStatement": null, "nextStatement": null, "colour": 260 },
            { "type": "move_xyz", "message0": "Posição X:%1 Y:%2 Z:%3", "args0": [
                {"type": "input_value", "name": "X", "check": "Number"},
                {"type": "input_value", "name": "Y", "check": "Number"},
                {"type": "input_value", "name": "Z", "check": "Number"}
            ], "previousStatement": null, "nextStatement": null, "colour": 210 }
        ]);

        const generator = Blockly.JavaScript;
        generator.forBlock['event_when_run'] = () => '';
        generator.forBlock['create_cube'] = () => 'window.addObj("cube", 0x4C97FF);\n';
        generator.forBlock['create_sphere'] = () => 'window.addObj("sphere", 0x4C97FF);\n';
        generator.forBlock['spawn_enemy'] = () => 'window.addObj("cube", 0xff0000, "enemy");\n';
        generator.forBlock['spawn_checkpoint'] = () => 'window.addObj("cylinder", 0xffff00, "checkpoint");\n';
        generator.forBlock['spawn_victory'] = () => 'window.addObj("sphere", 0x00ff00, "victory");\n';
        generator.forBlock['give_weapon'] = () => 'console.log("Arma Equipada!");\n';
        
        generator.forBlock['move_xyz'] = (b) => {
            const x = generator.valueToCode(b, 'X', generator.ORDER_ATOMIC) || 0;
            const y = generator.valueToCode(b, 'Y', generator.ORDER_ATOMIC) || 0;
            const z = generator.valueToCode(b, 'Z', generator.ORDER_ATOMIC) || 0;
            return `window.moveLast(${x}, ${y}, ${z});\n`;
        };
        generator.forBlock['set_color'] = (b) => `window.colorLast("${b.getFieldValue('COL')}");\n`;

        // --- 4. ENGINE LOGIC ---
        window.addObj = function(type, col, tag) {
            let geo;
            if(type === "cube") geo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
            else if(type === "sphere") geo = new THREE.SphereGeometry(1);
            else geo = new THREE.CylinderGeometry(0.3, 0.3, 2.5);

            let mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({color: col}));
            mesh.position.y = 0.75;
            mesh.userData.tag = tag;
            scene.add(mesh);
            objects.push(mesh);
        };

        window.moveLast = function(x,y,z) { if(objects.length) objects[objects.length-1].position.set(x,y,z); };
        window.colorLast = function(c) { if(objects.length) objects[objects.length-1].material.color.set(c); };

        function clearWorld() {
            objects.forEach(o => scene.remove(o));
            objects = [];
            if(player) { scene.remove(player); player = null; }
        }

        const workspace = Blockly.inject('blocklyDiv', { toolbox: document.getElementById('toolbox') });

        function runCode(externalXml = null) {
            clearWorld();
            isPlaying = true;
            orbit.enabled = false;
            
            // Criar Personagem (Cápsula)
            player = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1), new THREE.MeshStandardMaterial({color: 0xeeeeee}));
            player.position.set(0, 1.2, 0);
            scene.add(player);

            const xml = externalXml || Blockly.Xml.workspaceToDom(workspace);
            if(externalXml) { workspace.clear(); Blockly.Xml.domToWorkspace(externalXml, workspace); }
            
            const code = generator.workspaceToCode(workspace);
            try { eval(code); } catch(e) { console.error("Erro na Engine:", e); }
        }

        function resetEditor() {
            isPlaying = false;
            orbit.enabled = true;
            camera.position.set(10, 10, 10);
            if(player) { scene.remove(player); player = null; }
        }

        // --- 5. FIREBASE COMMUNITY ---
        function publishGame() {
            const name = prompt("Dê um nome ao seu jogo:");
            if(!name) return;
            const xml = Blockly.Xml.workspaceToDom(workspace);
            const xmlText = Blockly.Xml.domToText(xml);
            db.ref('games').push({ name: name, data: xmlText, author: "Criador G-Block" });
            alert("Jogo publicado na comunidade!");
        }

        function loadCommunity() {
            db.ref('games').on('value', (snap) => {
                const list = document.getElementById('game-list');
                list.innerHTML = '';
                snap.forEach((child) => {
                    const game = child.val();
                    const item = document.createElement('div');
                    item.className = 'game-item';
                    item.innerHTML = `<div><b>${game.name}</b><br><small>por ${game.author}</small></div>
                                      <button style="background:#00e676" onclick="playRemote('${child.key}')">JOGAR</button>`;
                    list.appendChild(item);
                });
            });
        }

        window.playRemote = function(id) {
            db.ref('games/' + id).once('value', (snap) => {
                const xml = Blockly.Xml.textToDom(snap.val().data);
                switchTab('editor');
                runCode(xml);
            });
        };

        function switchTab(tab) {
            document.getElementById('blocklyDiv').style.display = tab === 'editor' ? 'block' : 'none';
            document.getElementById('community-div').style.display = tab === 'community' ? 'block' : 'none';
            document.getElementById('btn-editor').classList.toggle('active', tab === 'editor');
            document.getElementById('btn-community').classList.toggle('active', tab === 'community');
            if(tab === 'editor') Blockly.svgResize(workspace);
        }

        loadCommunity();
    </script>
</body>
</html>
