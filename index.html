<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Kids Code - Criador 3D</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; display: flex; }
        #blocklyDiv { height: 100vh; width: 50%; }
        #visualizer { height: 100vh; width: 50%; background: #111; }
        #runBtn { 
            position: absolute; bottom: 20px; right: 20px; 
            padding: 15px 30px; background: #2ecc71; color: white; 
            border: none; border-radius: 50px; cursor: pointer; font-size: 18px;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="blocklyDiv"></div>
    <div id="visualizer"></div>
    <button id="runBtn" onclick="runCode()">▶ Rodar Código</button>

    <xml id="toolbox" style="display: none">
        <category name="Criar" colour="#5C81A6">
            <block type="create_cube"></block>
            <block type="create_sphere"></block>
        </category>
        <category name="Transformar" colour="#A65C81">
            <block type="move_object"></block>
            <block type="rotate_object"></block>
        </category>
    </xml>

    <script>
        // --- 1. CONFIGURAÇÃO DO THREE.JS (O MUNDO 3D) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);
        const camera = new THREE.PerspectiveCamera(75, (window.innerWidth/2) / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth / 2, window.innerHeight);
        document.getElementById('visualizer').appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 5, 5).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        camera.position.z = 10;
        camera.position.y = 5;
        camera.lookAt(0,0,0);

        let objects = []; // Lista para limpar a cena ao rodar de novo

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // --- 2. CONFIGURAÇÃO DO BLOCKLY (OS BLOCOS) ---
        
        // Bloco de Criar Cubo
        Blockly.Blocks['create_cube'] = {
            init: function() {
                this.appendDummyInput().appendField("Criar Cubo 🧊");
                this.setPreviousStatement(true, null);
                this.setNextStatement(true, null);
                this.setColour(230);
            }
        };

        // Bloco de Mover
        Blockly.Blocks['move_object'] = {
            init: function() {
                this.appendDummyInput()
                    .appendField("Mover para X:")
                    .appendField(new Blockly.FieldNumber(0), "X");
                this.setPreviousStatement(true, null);
                this.setNextStatement(true, null);
                this.setColour(290);
            }
        };

        // Geradores de Código JavaScript
        javascript.javascriptGenerator.forBlock['create_cube'] = function(block) {
            return 'addCube();\n';
        };

        javascript.javascriptGenerator.forBlock['move_object'] = function(block) {
            const x = block.getFieldValue('X');
            return `moveLastObject(${x});\n`;
        };

        // Funções que o código gerado vai chamar
        function addCube() {
            const geo = new THREE.BoxGeometry(2, 2, 2);
            const mat = new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff });
            const cube = new THREE.Mesh(geo, mat);
            scene.add(cube);
            objects.push(cube);
        }

        function moveLastObject(x) {
            if(objects.length > 0) {
                objects[objects.length - 1].position.x = x;
            }
        }

        // Injetar Blockly
        const workspace = Blockly.inject('blocklyDiv', {
            toolbox: document.getElementById('toolbox'),
            scrollbars: true
        });

        // Execução
        function runCode() {
            // Limpa cena anterior
            objects.forEach(obj => scene.remove(obj));
            objects = [];
            
            // Gera e executa o código
            const code = javascript.javascriptGenerator.workspaceToCode(workspace);
            try {
                eval(code);
            } catch (e) {
                console.error(e);
            }
        }
    </script>
</body>
</html>
