<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Block 3D Builder</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #222; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #blocklyDiv { width: 50%; height: 100%; border-right: 2px solid #444; }
        #visualizer { width: 50%; height: 100%; position: relative; }
        #ui-overlay { position: absolute; top: 10px; right: 10px; z-index: 10; display: flex; gap: 10px; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; transition: 0.3s; }
        #runBtn { background: #27ae60; color: white; }
        #runBtn:hover { background: #2ecc71; }
        #clearBtn { background: #c0392b; color: white; }
    </style>
</head>
<body>

    <div id="blocklyDiv"></div>
    <div id="visualizer">
        <div id="ui-overlay">
            <button id="clearBtn" onclick="clearScene()">Limpar Cena</button>
            <button id="runBtn" onclick="runCode()">▶ Executar</button>
        </div>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="Formas 3D" colour="#5C81A6">
            <block type="create_cube"></block>
            <block type="create_sphere"></block>
            <block type="create_plane"></block>
        </category>
        <category name="Movimento" colour="#5CA672">
            <block type="move_xyz"></block>
            <block type="rotate_xyz"></block>
            <block type="scale_obj"></block>
        </category>
        <category name="Estilo" colour="#A65C81">
            <block type="set_color"></block>
        </category>
        <category name="Lógica" colour="#A6725C">
            <block type="controls_repeat_ext">
                <value name="TIMES">
                    <shadow type="math_number">
                        <field name="NUM">3</field>
                    </shadow>
                </value>
            </block>
            <block type="math_number"></block>
        </category>
    </xml>

    <script>
        // --- MOTOR 3D (THREE.JS) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        const camera = new THREE.PerspectiveCamera(75, (window.innerWidth/2) / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth / 2, window.innerHeight);
        document.getElementById('visualizer').appendChild(renderer.domElement);

        // Grid e Luzes
        const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
        scene.add(gridHelper);
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffffff, 0.8);
        pointLight.position.set(10, 10, 10);
        scene.add(pointLight);

        camera.position.set(10, 10, 10);
        camera.lookAt(0, 0, 0);

        let objects = [];
        let lastObj = null;

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // --- DEFINIÇÃO DOS BLOCOS CUSTOMIZADOS ---

        // Criar Formas
        const createBlock = (name, label, color) => {
            Blockly.Blocks[name] = {
                init: function() {
                    this.appendDummyInput().appendField(label);
                    this.setPreviousStatement(true, null);
                    this.setNextStatement(true, null);
                    this.setColour(color);
                }
            };
        };

        createBlock('create_cube', '📦 Criar Cubo', 160);
        createBlock('create_sphere', '🔮 Criar Esfera', 160);
        createBlock('create_plane', '🏁 Criar Chão', 160);

        // Movimento e Transformação
        Blockly.Blocks['move_xyz'] = {
            init: function() {
                this.appendDummyInput().appendField("Mover p/ X:")
                    .appendField(new Blockly.FieldNumber(0), "X")
                    .appendField("Y:")
                    .appendField(new Blockly.FieldNumber(0), "Y")
                    .appendField("Z:")
                    .appendField(new Blockly.FieldNumber(0), "Z");
                this.setPreviousStatement(true, null);
                this.setNextStatement(true, null);
                this.setColour(120);
            }
        };

        Blockly.Blocks['rotate_xyz'] = {
            init: function() {
                this.appendDummyInput().appendField("Girar em X:")
                    .appendField(new Blockly.FieldNumber(0), "X");
                this.setPreviousStatement(true, null);
                this.setNextStatement(true, null);
                this.setColour(120);
            }
        };

        Blockly.Blocks['set_color'] = {
            init: function() {
                this.appendDummyInput().appendField("Pintar de:")
                    .appendField(new Blockly.FieldColour("#ff0000"), "COL");
                this.setPreviousStatement(true, null);
                this.setNextStatement(true, null);
                this.setColour(20);
            }
        };

        // --- GERADORES DE CÓDIGO ---
        const javascriptGenerator = Blockly.JavaScript;

        javascriptGenerator['create_cube'] = () => 'addObj("cube");\n';
        javascriptGenerator['create_sphere'] = () => 'addObj("sphere");\n';
        javascriptGenerator['create_plane'] = () => 'addObj("plane");\n';

        javascriptGenerator['move_xyz'] = (block) => {
            return `moveObj(${block.getFieldValue('X')}, ${block.getFieldValue('Y')}, ${block.getFieldValue('Z')});\n`;
        };

        javascriptGenerator['rotate_xyz'] = (block) => {
            return `rotateObj(${block.getFieldValue('X')});\n`;
        };

        javascriptGenerator['set_color'] = (block) => {
            return `colorObj("${block.getFieldValue('COL')}");\n`;
        };

        // --- FUNÇÕES DE EXECUÇÃO DO MUNDO 3D ---
        function addObj(type) {
            let geo;
            if(type === "cube") geo = new THREE.BoxGeometry(2, 2, 2);
            else if(type === "sphere") geo = new THREE.SphereGeometry(1.5, 32, 32);
            else geo = new THREE.PlaneGeometry(5, 5);

            const mat = new THREE.MeshStandardMaterial({ color: 0x00ff00 });
            const mesh = new THREE.Mesh(geo, mat);
            if(type === "plane") mesh.rotation.x = -Math.PI / 2;
            
            scene.add(mesh);
            objects.push(mesh);
            lastObj = mesh;
        }

        function moveObj(x, y, z) {
            if(lastObj) lastObj.position.set(x, y, z);
        }

        function rotateObj(deg) {
            if(lastObj) lastObj.rotation.x += deg * (Math.PI / 180);
        }

        function colorObj(hex) {
            if(lastObj) lastObj.material.color.set(hex);
        }

        function clearScene() {
            objects.forEach(obj => scene.remove(obj));
            objects = [];
            lastObj = null;
        }

        // --- INICIALIZAÇÃO ---
        const workspace = Blockly.inject('blocklyDiv', {
            toolbox: document.getElementById('toolbox'),
            zoom: { controls: true, wheel: true }
        });

        function runCode() {
            clearScene();
            const code = javascriptGenerator.workspaceToCode(workspace);
            try {
                eval(code);
            } catch (e) {
                alert("Erro no código: " + e);
            }
        }

        // Responsividade
        window.addEventListener('resize', () => {
            camera.aspect = (window.innerWidth/2) / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth / 2, window.innerHeight);
        });
    </script>
</body>
</html>
