<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Block Revolution - Obby & IA Pro</title>
    
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/@blockly/field-colour"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/TransformControls.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { margin: 0; display: flex; height: 100vh; background: #111; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Layout Principal */
        #left-panel { width: 40%; height: 100%; display: flex; flex-direction: column; border-right: 2px solid #333; }
        #visualizer { width: 60%; height: 100%; position: relative; background: #000; }
        
        /* Abas */
        #tabs { display: flex; background: #222; border-bottom: 2px solid #444; }
        .tab-btn { padding: 12px; cursor: pointer; background: none; border: none; color: #777; font-weight: bold; flex: 1; font-size: 11px; text-transform: uppercase; }
        .tab-btn.active { color: #00e676; border-bottom: 2px solid #00e676; background: #2a2a2a; }
        
        .content-area { flex: 1; display: none; overflow-y: auto; background: #1a1a1a; }
        .content-area.active { display: flex; flex-direction: column; }

        /* Aba de Componentes */
        .asset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .asset-card { background: #333; padding: 15px; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid #444; transition: 0.2s; }
        .asset-card:hover { border-color: #00e676; background: #3d3d3d; }
        .asset-card span { display: block; margin-top: 5px; font-size: 14px; }

        /* UI do Palco */
        #ui-layer { position: absolute; top: 15px; right: 15px; z-index: 100; display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }
        .btn-group { display: flex; gap: 5px; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 5px; }
        button { padding: 10px 15px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-green { background: #00e676; color: black; }
        .tool-btn { background: #444; color: white; font-size: 11px; }

        #game-instr { position: absolute; bottom: 15px; left: 15px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; color: #00e676; font-size: 12px; border: 1px solid #00e676; pointer-events: none; }
    </style>
</head>
<body>

    <div id="left-panel">
        <div id="tabs">
            <button class="tab-btn active" onclick="switchTab('editor')">Blocos</button>
            <button class="tab-btn" onclick="switchTab('assets')">Componentes</button>
            <button class="tab-btn" onclick="switchTab('objects')">Objetos</button>
        </div>

        <div id="tab-editor" class="content-area active">
            <div id="blocklyDiv" style="height: 100%;"></div>
        </div>

        <div id="tab-assets" class="content-area">
            <div class="asset-grid">
                <div class="asset-card" onclick="spawnAsset('cube', 0x4C97FF, 'Plataforma')">📦 <span>Bloco</span></div>
                <div class="asset-card" onclick="spawnAsset('cube', 0xff0000, 'Inimigo')">💀 <span>Inimigo IA</span></div>
                <div class="asset-card" onclick="spawnAsset('cylinder', 0xffff00, 'Checkpoint')">🚩 <span>Checkpoint</span></div>
                <div class="asset-card" onclick="spawnAsset('sphere', 0x00ff00, 'Vitoria')">🏆 <span>Vitória</span></div>
            </div>
        </div>

        <div id="tab-objects" class="content-area">
            <div id="obj-list" style="padding: 10px;"></div>
        </div>
    </div>

    <div id="visualizer">
        <div id="ui-layer">
            <div class="btn-group">
                <button class="tool-btn" onclick="setGizmoMode('translate')">MOVER</button>
                <button class="tool-btn" onclick="setGizmoMode('scale')">ESCALAR</button>
            </div>
            <button class="btn-green" onclick="runCode()">▶ JOGAR</button>
            <button style="background:#555; color:white" onclick="resetEditor()">🔄 EDITOR</button>
            <button style="background:#ff4444; color:white" onclick="resetWorld()">🗑️ LIMPAR</button>
        </div>
        <div id="game-instr"><b>WASD</b> para mover | <b>ESPAÇO</b> para pular | <b>ESC</b> p/ Editor</div>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="Eventos" colour="#FFD500"><block type="event_when_run"></block></category>
        <category name="Construção" colour="#9966FF">
            <block type="create_cube"></block>
            <block type="set_color"></block>
        </category>
    </xml>

    <script>
        // --- CONFIGURAÇÃO FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyAqw3mMEc8ZiG9ZKC8R3O5bJ8VQ4d9vwaM",
            authDomain: "gamefriends-fc791.firebaseapp.com",
            databaseURL: "https://gamefriends-fc791-default-rtdb.firebaseio.com",
            projectId: "gamefriends-fc791",
            storageBucket: "gamefriends-fc791.firebasestorage.app",
            messagingSenderId: "329648550875",
            appId: "1:329648550875:web:6112d5521f117378f52dfe"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- ENGINE 3D ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        
        const camera = new THREE.PerspectiveCamera(75, (window.innerWidth*0.6)/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth*0.6, window.innerHeight);
        document.getElementById('visualizer').appendChild(renderer.domElement);

        // Chão de Grama
        const grassTex = new THREE.TextureLoader().load('https://threejs.org/examples/textures/terrain/grasslight-big.jpg');
        grassTex.wrapS = grassTex.wrapT = THREE.RepeatWrapping; grassTex.repeat.set(20, 20);
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({map: grassTex}));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const orbit = new THREE.OrbitControls(camera, renderer.domElement);
        camera.position.set(10, 10, 10);

        const gizmo = new THREE.TransformControls(camera, renderer.domElement);
        gizmo.addEventListener('dragging-changed', e => orbit.enabled = !e.value);
        scene.add(gizmo);

        // Estado do Jogo
        let objects = [], enemies = [], checkpoints = [], wins = [];
        let player = null, isPlaying = false, spawnPos = new THREE.Vector3(0, 2, 0);
        let velocityY = 0, isJumping = false;
        const keys = {};

        window.onkeydown = e => { 
            keys[e.key.toLowerCase()] = true; 
            if(e.code === "Space") jump(); 
            if(e.key === "Escape") resetEditor();
        };
        window.onkeyup = e => keys[e.key.toLowerCase()] = false;

        function jump() {
            if(isPlaying && player && !isJumping) {
                velocityY = 0.25;
                isJumping = true;
            }
        }

        // --- LOOP DE ANIMAÇÃO ---
        function animate() {
            requestAnimationFrame(animate);
            
            if (isPlaying && player) {
                // Movimento Lateral
                const speed = 0.15;
                if(keys['w']) player.position.z -= speed;
                if(keys['s']) player.position.z += speed;
                if(keys['a']) player.position.x -= speed;
                if(keys['d']) player.position.x += speed;

                // GRAVIDADE
                velocityY -= 0.012;
                player.position.y += velocityY;

                // COLISÃO COM CHÃO E OBJETOS
                let rayOrigin = new THREE.Vector3(player.position.x, player.position.y, player.position.z);
                const raycaster = new THREE.Raycaster(rayOrigin, new THREE.Vector3(0, -1, 0), 0, 1.1);
                const intersects = raycaster.intersectObjects([ground, ...objects]);

                if(intersects.length > 0) {
                    player.position.y = intersects[0].point.y + 1;
                    velocityY = 0;
                    isJumping = false;
                }

                // MORTE NO VAZIO (Cair no nada)
                if(player.position.y < -12) {
                    player.position.copy(spawnPos);
                    velocityY = 0;
                }

                // IA DOS INIMIGOS (PERSEGUIÇÃO)
                enemies.forEach(en => {
                    const dist = en.position.distanceTo(player.position);
                    if(dist < 15) { // Raio de visão
                        const dir = new THREE.Vector3().subVectors(player.position, en.position).normalize();
                        en.position.x += dir.x * 0.05;
                        en.position.z += dir.z * 0.05;
                    }
                    if(dist < 1.2) player.position.copy(spawnPos); // Dano/Morte
                });

                // OUTRAS COLISÕES
                checkpoints.forEach(cp => { if(player.position.distanceTo(cp.position) < 1.5) spawnPos.copy(cp.position); });
                wins.forEach(wi => { if(player.position.distanceTo(wi.position) < 1.5) { alert("OBBY CONCLUÍDO!"); resetEditor(); } });

                camera.position.set(player.position.x, player.position.y + 6, player.position.z + 10);
                camera.lookAt(player.position);
            } else {
                orbit.update();
            }
            renderer.render(scene, camera);
        }
        animate();

        // --- SISTEMA DE ASSETS E OBJETOS ---
        function spawnAsset(type, col, tag) {
            let geo = type === 'cube' ? new THREE.BoxGeometry(2, 2, 2) : (type === 'sphere' ? new THREE.SphereGeometry(1.2) : new THREE.CylinderGeometry(0.5, 0.5, 3));
            const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({color: col}));
            mesh.position.set(0, 1.5, 0);
            mesh.userData = { name: tag + " " + (objects.length+1), tag: tag };
            
            scene.add(mesh);
            objects.push(mesh);
            if(tag === 'Inimigo') enemies.push(mesh);
            if(tag === 'Checkpoint') checkpoints.push(mesh);
            if(tag === 'Vitoria') wins.push(mesh);
            
            gizmo.attach(mesh);
            updateObjectList();
        }

        function updateObjectList() {
            const list = document.getElementById('obj-list');
            list.innerHTML = objects.map((o, i) => `
                <div class="obj-item" onclick="gizmo.attach(objects[${i}])">${o.userData.name}</div>
            `).join('');
        }

        function setGizmoMode(m) { gizmo.setMode(m); }

        function runCode() {
            isPlaying = true;
            orbit.enabled = false;
            gizmo.detach();
            player = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 1.8), new THREE.MeshStandardMaterial({color: 0xffffff}));
            player.position.copy(spawnPos);
            scene.add(player);
        }

        function resetEditor() {
            isPlaying = false; orbit.enabled = true;
            if(player) scene.remove(player);
            player = null; velocityY = 0;
        }

        function resetWorld() {
            gizmo.detach();
            objects.forEach(o => scene.remove(o));
            objects = []; enemies = []; checkpoints = []; wins = [];
            updateObjectList();
        }

        // --- BLOCKLY ---
        Blockly.defineBlocksWithJsonArray([
            { "type": "event_when_run", "message0": "🏁 Iniciar Jogo", "nextStatement": null, "colour": 60 },
            { "type": "create_cube", "message0": "📦 Criar Cubo", "previousStatement": null, "nextStatement": null, "colour": 260 },
            { "type": "set_color", "message0": "Pintar de %1", "args0": [{ "type": "field_colour", "name": "COL", "colour": "#ff0000" }], "previousStatement": null, "nextStatement": null, "colour": 260 }
        ]);

        const generator = Blockly.JavaScript;
        generator.forBlock['event_when_run'] = () => '';
        generator.forBlock['create_cube'] = () => 'window.addObj("cube", 0x4C97FF, "Bloco");\n';
        generator.forBlock['set_color'] = (b) => `window.colorLast("${b.getFieldValue('COL')}");\n`;

        window.addObj = function(t, c, n) { spawnAsset(t, c, n); };
        window.colorLast = function(c) { if(objects.length) objects[objects.length-1].material.color.set(c); };

        const workspace = Blockly.inject('blocklyDiv', { toolbox: document.getElementById('toolbox') });

        function switchTab(t) {
            document.querySelectorAll('.content-area').forEach(a => a.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + t).classList.add('active');
            event.currentTarget.classList.add('active');
            if(t === 'editor') Blockly.svgResize(workspace);
        }
    </script>
</body>
</html>
