<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Block 3D Revolution - Full Edition</title>
    
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            background: #111; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden;
        }
        #blocklyDiv { 
            width: 55%; 
            height: 100%; 
            background: #ffffff; 
        }
        #visualizer { 
            width: 45%; 
            height: 100%; 
            position: relative; 
            background: #000;
            border-left: 2px solid #333;
        }
        #ui-layer { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            z-index: 1000; 
            display: flex; 
            gap: 10px; 
        }
        button { 
            padding: 12px 25px; 
            cursor: pointer; 
            border-radius: 8px; 
            border: none; 
            font-weight: bold; 
            text-transform: uppercase;
            transition: transform 0.1s, background 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        button:active { transform: scale(0.95); }
        #runBtn { background: #00e676; color: #003311; }
        #runBtn:hover { background: #00ff88; }
        #clearBtn { background: #ff5252; color: white; }
        #clearBtn:hover { background: #ff1744; }
        
        .blocklyTreeLabel { font-size: 16px; padding: 5px; }
    </style>
</head>
<body>

    <div id="blocklyDiv"></div>
    
    <div id="visualizer">
        <div id="ui-layer">
            <button id="clearBtn" onclick="clearScene()">Limpar Tudo</button>
            <button id="runBtn" onclick="runCode()">▶ Rodar Código</button>
        </div>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="Eventos" colour="#FFD500">
            <block type="event_when_run"></block>
        </category>
        
        <category name="Aparência" colour="#9966FF">
            <block type="create_cube"></block>
            <block type="create_sphere"></block>
            <block type="create_cylinder"></block>
            <block type="set_color"></block>
        </category>
        
        <category name="Movimento" colour="#4C97FF">
            <block type="move_xyz">
                <value name="X"><shadow type="math_number"><field name="NUM">0</field></shadow></value>
                <value name="Y"><shadow type="math_number"><field name="NUM">0</field></shadow></value>
                <value name="Z"><shadow type="math_number"><field name="NUM">0</field></shadow></value>
            </block>
            <block type="rotate_obj">
                <field name="AXIS">x</field>
                <value name="DEG"><shadow type="math_number"><field name="NUM">45</field></shadow></value>
            </block>
        </category>
        
        <category name="Largura" colour="#0FBD8C">
            <block type="set_dim">
                <field name="DIM">x</field>
                <value name="VAL"><shadow type="math_number"><field name="NUM">1</field></shadow></value>
            </block>
        </category>
        
        <category name="Altura" colour="#0FBD8C">
            <block type="set_dim">
                <field name="DIM">y</field>
                <value name="VAL"><shadow type="math_number"><field name="NUM">1</field></shadow></value>
            </block>
        </category>
        
        <category name="Profundidade" colour="#0FBD8C">
            <block type="set_dim">
                <field name="DIM">z</field>
                <value name="VAL"><shadow type="math_number"><field name="NUM">1</field></shadow></value>
            </block>
        </category>

        <sep></sep>
        
        <category name="Controle" colour="#FFAB19">
            <block type="controls_repeat_ext">
                <value name="TIMES"><shadow type="math_number"><field name="NUM">5</field></shadow></value>
            </block>
            <block type="controls_if"></block>
            <block type="controls_whileUntil"></block>
        </category>
        
        <category name="Lógica" colour="#59C059">
            <block type="logic_compare"></block>
            <block type="logic_operation"></block>
            <block type="logic_negate"></block>
            <block type="logic_boolean"></block>
        </category>
        
        <category name="Matemática" colour="#5962C0">
            <block type="math_number"></block>
            <block type="math_arithmetic"></block>
            <block type="math_random_int">
                <value name="FROM"><shadow type="math_number"><field name="NUM">1</field></shadow></value>
                <value name="TO"><shadow type="math_number"><field name="NUM">10</field></shadow></value>
            </block>
        </category>
        
        <category name="Variáveis" colour="#FF8C1A" custom="VARIABLE"></category>
    </xml>

    <script>
        // --- 1. CONFIGURAÇÃO DO MOTOR 3D (THREE.JS) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        
        const camera = new THREE.PerspectiveCamera(75, (window.innerWidth * 0.45) / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth * 0.45, window.innerHeight);
        document.getElementById('visualizer').appendChild(renderer.domElement);

        // Grade de referência para o chão
        const grid = new THREE.GridHelper(30, 30, 0x444444, 0x222222);
        scene.add(grid);
        
        // Iluminação
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);

        camera.position.set(12, 12, 12);
        camera.lookAt(0, 0, 0);

        let objects = [];
        let lastObj = null;

        // Loop de renderização
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // --- 2. DEFINIÇÃO DE BLOCOS CUSTOMIZADOS ---
        Blockly.defineBlocksWithJsonArray([
            { "type": "event_when_run", "message0": "🏁 Ao clicar em Rodar", "nextStatement": null, "colour": 60 },
            { "type": "create_cube", "message0": "📦 Criar Cubo", "previousStatement": null, "nextStatement": null, "colour": 260 },
            { "type": "create_sphere", "message0": "🔮 Criar Esfera", "previousStatement": null, "nextStatement": null, "colour": 260 },
            { "type": "create_cylinder", "message0": "🧪 Criar Cilindro", "previousStatement": null, "nextStatement": null, "colour": 260 },
            { "type": "set_color", "message0": "Pintar de %1", "args0": [{ "type": "field_colour", "name": "COL", "colour": "#ff0000" }], "previousStatement": null, "nextStatement": null, "colour": 260 },
            { "type": "move_xyz", "message0": "Mover X: %1 Y: %2 Z: %3", "args0": [
                { "type": "input_value", "name": "X", "check": "Number" },
                { "type": "input_value", "name": "Y", "check": "Number" },
                { "type": "input_value", "name": "Z", "check": "Number" }
            ], "previousStatement": null, "nextStatement": null, "colour": 210 },
            { "type": "rotate_obj", "message0": "Girar no eixo %1 em %2 graus", "args0": [
                { "type": "field_dropdown", "name": "AXIS", "options": [["X", "x"], ["Y", "y"], ["Z", "z"]] },
                { "type": "input_value", "name": "DEG", "check": "Number" }
            ], "previousStatement": null, "nextStatement": null, "colour": 210 },
            { "type": "set_dim", "message0": "Mudar %1 para %2", "args0": [
                { "type": "field_dropdown", "name": "DIM", "options": [["Largura", "x"], ["Altura", "y"], ["Profundidade", "z"]] },
                { "type": "input_value", "name": "VAL", "check": "Number" }
            ], "previousStatement": null, "nextStatement": null, "colour": 160 }
        ]);

        // --- 3. GERADORES DE CÓDIGO (BLOCKLY -> JAVASCRIPT) ---
        const generator = Blockly.JavaScript;

        generator['event_when_run'] = function(block) { return ''; };
        generator['create_cube'] = function(block) { return 'window.addObj("cube");\n'; };
        generator['create_sphere'] = function(block) { return 'window.addObj("sphere");\n'; };
        generator['create_cylinder'] = function(block) { return 'window.addObj("cylinder");\n'; };
        
        generator['set_color'] = function(block) {
            const color = block.getFieldValue('COL');
            return `window.colorObj("${color}");\n`;
        };

        generator['move_xyz'] = function(block) {
            const x = generator.valueToCode(block, 'X', generator.ORDER_ATOMIC) || 0;
            const y = generator.valueToCode(block, 'Y', generator.ORDER_ATOMIC) || 0;
            const z = generator.valueToCode(block, 'Z', generator.ORDER_ATOMIC) || 0;
            return `window.moveObj(${x}, ${y}, ${z});\n`;
        };

        generator['rotate_obj'] = function(block) {
            const axis = block.getFieldValue('AXIS');
            const deg = generator.valueToCode(block, 'DEG', generator.ORDER_ATOMIC) || 0;
            return `window.rotateObj("${axis}", ${deg});\n`;
        };

        generator['set_dim'] = function(block) {
            const dim = block.getFieldValue('DIM');
            const val = generator.valueToCode(block, 'VAL', generator.ORDER_ATOMIC) || 1;
            return `window.scaleObj("${dim}", ${val});\n`;
        };

        // --- 4. FUNÇÕES DE SUPORTE NO ESCOPO GLOBAL ---
        window.addObj = function(type) {
            let geo;
            if(type === "cube") geo = new THREE.BoxGeometry(1, 1, 1);
            else if(type === "sphere") geo = new THREE.SphereGeometry(0.7, 32, 32);
            else geo = new THREE.CylinderGeometry(0.5, 0.5, 1, 32);

            const mat = new THREE.MeshStandardMaterial({ color: 0x4C97FF });
            const mesh = new THREE.Mesh(geo, mat);
            scene.add(mesh);
            objects.push(mesh);
            lastObj = mesh;
        };

        window.moveObj = function(x, y, z) { if(lastObj) lastObj.position.set(x, y, z); };
        
        window.rotateObj = function(axis, deg) {
            if(lastObj) {
                const rad = deg * (Math.PI / 180);
                lastObj.rotation[axis] += rad;
            }
        };

        window.scaleObj = function(axis, val) {
            if(lastObj) {
                const s = Math.max(0.1, val);
                lastObj.scale[axis] = s;
            }
        };

        window.colorObj = function(hex) { if(lastObj) lastObj.material.color.set(hex); };

        function clearScene() {
            objects.forEach(obj => scene.remove(obj));
            objects = [];
            lastObj = null;
        }

        // --- 5. INICIALIZAÇÃO DO WORKSPACE ---
        const workspace = Blockly.inject('blocklyDiv', {
            toolbox: document.getElementById('toolbox'),
            grid: { spacing: 25, length: 3, colour: '#ccc', snap: true },
            trashcan: true,
            zoom: { controls: true, wheel: true, startScale: 1.0 }
        });

        // Resolve bug de categorias não abrindo na primeira vez
        setTimeout(() => { Blockly.svgResize(workspace); }, 500);

        function runCode() {
            clearScene();
            const code = generator.workspaceToCode(workspace);
            console.log("Executando:\n", code);
            try {
                // Eval seguro via Function
                const exec = new Function(code);
                exec();
            } catch (e) {
                alert("Erro no código: " + e.message);
            }
        }

        // Redimensionamento automático
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            renderer.setSize(w * 0.45, h);
            camera.aspect = (w * 0.45) / h;
            camera.updateProjectionMatrix();
            Blockly.svgResize(workspace);
        });
    </script>
</body>
</html>
